version: '3.8'

services:
  vllm-server:
    image: vllm/vllm-openai:latest
    container_name: vllm_qwen_deployment
    ports:
      - "8000:8000"
    volumes:
      - ../inference/deployed_model:/model
    ipc: host
    shm_size: '2gb'
    environment:
      - VLLM_TORCH_COMPILE_LEVEL=0
    command: >
      --model /model
      --host 0.0.0.0
      --port 8000
      --trust-remote-code
      --quantization bitsandbytes
      --load-format bitsandbytes
      --enforce-eager
      --gpu-memory-utilization 0.95
      --max-model-len 2048
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
